<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethnora - Wedding Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(to bottom, #fffaf5, #f3e8ff);
}

/* HEADER */
header {
  background: linear-gradient(90deg, #ffffff, #f3e8ff);
  color:#5b2c6f;
  padding:18px;
  text-align:center;
  font-size:26px;
  letter-spacing:2px;
  font-weight:bold;
}

/* NAV */
nav {
  display:flex;
  justify-content:center;
  background: linear-gradient(90deg, #f8e1ff, #e6ccff);
}
nav button {
  padding:15px 25px;
  border:none;
  background:none;
  font-size:18px;
  cursor:pointer;
  color:#5b2c6f;
}
nav button:hover {
  background:#ffffff;
}

/* SECTIONS */
.section { display:none; padding:20px; }
.active { display:block; }

/* HERO */
.hero-container {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

/* YOUR IMAGE BACKGROUND */
.model {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('lehenga1.jpg') no-repeat center/cover;
  animation: zoomMove 12s ease-in-out infinite alternate;
  z-index: 1;
}

/* SOFT OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(150, 100, 200, 0.3);
  z-index: 2;
}

/* FLOWERS & SPARKLES */
.flowers::before {
  content: "🌸 ✨ 🌷 💫";
  position: absolute;
  top: 20px;
  left: 30px;
  font-size: 26px;
  animation: float 6s infinite;
}

.flowers::after {
  content: "💜 🌸 ✨";
  position: absolute;
  bottom: 30px;
  right: 30px;
  font-size: 26px;
  animation: float 5s infinite;
}

/* TEXT */
.hero-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ffffff;
  text-align: center;
  z-index: 3;
}

.hero-text h1 {
  font-size: 85px;
  letter-spacing: 8px;
  opacity: 0;
  animation: textReveal 2s ease forwards;
}

.hero-text p {
  font-size: 24px;
  margin-top:10px;
  opacity: 0;
  animation: fadeIn 3s ease forwards;
}

/* ANIMATIONS */
@keyframes zoomMove {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

@keyframes textReveal {
  to { opacity: 1; transform: translate(-50%, -50%); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0); }
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:15px;
}
.gallery img {
  width:100%;
  border-radius:12px;
  transition: transform 0.3s;
}
.gallery img:hover {
  transform: scale(1.05);
}

/* SECTION HEADINGS */
h2 {
  text-align:center;
  color:#5b2c6f;
}

/* FOOTER */
footer {
  background:#f3e8ff;
  color:#5b2c6f;
  text-align:center;
  padding:20px;
  margin-top:30px;
}
</style>
</head>

<body>

<header>ETHNORA ✨ Wedding Collection</header>

<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('lehenga')">Lehenga</button>
<button onclick="showSection('suit')">Suit</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero-container flowers">

    <div class="model"></div>
    <div class="overlay"></div>

    <div class="hero-text">
      <h1>ETHNORA</h1>
      <p>Elegance in Every Thread 💜</p>
    </div>

  </div>
</div>

<!-- LEHENGA -->
<div id="lehenga" class="section">
<h2>Bridal Lehenga Collection 👰</h2>
<div class="gallery">
<img src="lehenga1.jpg">
<img src="lehenga1.jpg">
<img src="lehenga1.jpg">
</div>
</div>

<!-- SUIT -->
<div id="suit" class="section">
<h2>Festive Suit Collection 🌸</h2>
<div class="gallery">
<img src="lehenga1.jpg">
<img src="lehenga1.jpg">
<img src="lehenga1.jpg">
</div>
</div>

<footer>
<p>Name: Kashish Anand (Owner)</p>
<p>Contact: 9958552180</p>
<p>Partner: Rajat Kumar</p>
<p>Contact: 9717483809</p>
<p>Address: Delhi 110053</p>
</footer>

<script>
function showSection(sectionId) {
document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
document.getElementById(sectionId).classList.add('active');
}
</script>

</body>
</html>
