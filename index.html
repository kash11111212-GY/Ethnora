<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethnora - By Kashish</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family: 'Playfair Display', serif; background:#fff7f0; }

header { background:#8b0000; color:white; padding:15px; text-align:center; font-size:24px; }

nav { display:flex; justify-content:center; background:#d4af37; }
nav button { padding:15px 25px; border:none; background:none; font-size:18px; cursor:pointer; }
nav button:hover { background:#fff; }

.section { display:none; padding:20px; }
.active { display:block; }

/* PREMIUM HERO */
.hero-container {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.model {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1610030469668-3d8b7c6b2e5e') no-repeat center/cover;
  animation: zoomMove 10s ease-in-out infinite alternate;
  z-index: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 2;
}

.hero-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  z-index: 3;
}

.hero-text h1 {
  font-size: 80px;
  letter-spacing: 8px;
  opacity: 0;
  transform: translateY(50px);
  animation: textReveal 2s ease forwards;
}

.hero-text p {
  font-size: 22px;
  opacity: 0;
  animation: fadeIn 3s ease forwards;
}

@keyframes zoomMove {
  from { transform: scale(1) translateX(0); }
  to { transform: scale(1.1) translateX(-20px); }
}

@keyframes textReveal {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* OTHER SECTIONS */
.hero { height:300px; display:flex; align-items:center; justify-content:center; color:white; font-size:30px; }

.lehenga-hero {
background: url('https://images.unsplash.com/photo-1610030469668-3d8b7c6b2e5e') no-repeat center/cover;
}

.suit-hero {
background: url('https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf') no-repeat center/cover;
}

.gallery { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:15px; }
.gallery img { width:100%; border-radius:10px; }

footer { background:#8b0000; color:white; text-align:center; padding:20px; margin-top:30px; }
</style>
</head>

<body>

<header>Ethnora</header>

<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('lehenga')">Lehenga</button>
<button onclick="showSection('suit')">Suit</button>
</nav>

<!-- PREMIUM HOME -->
<div id="home" class="section active">
  <div class="hero-container">

    <div class="model"></div>
    <div class="overlay"></div>

    <div class="hero-text">
      <h1>ETHNORA</h1>
      <p>Elegance in Motion</p>
    </div>

  </div>
</div>

<!-- LEHENGA -->
<div id="lehenga" class="section">
<div class="hero lehenga-hero">Lehenga Styles</div>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
<img src="https://images.unsplash.com/photo-1610701596007-11502861dcfa">
<img src="https://images.unsplash.com/photo-1603252109303-2751441dd157">
</div>
</div>

<!-- SUIT -->
<div id="suit" class="section">
<div class="hero suit-hero">Elegant Suit Collection</div>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
<img src="https://images.unsplash.com/photo-1583391733956-6c78276477e2">
<img src="https://images.unsplash.com/photo-1603252109303-2751441dd157">
</div>
</div>

<footer>
<p>Name: Kashish Anand (Owner)</p>
<p>Contact no.: 9958552180</p>
<p>Partner: Rajat Kumar</p>
<p>Contact no.: 9717483809</p>
<p>Address: Delhi 110053, A 46/3 Seelampur</p>
</footer>

<script>
function showSection(sectionId) {
document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
document.getElementById(sectionId).classList.add('active');
}
</script>

</body>
</html>
